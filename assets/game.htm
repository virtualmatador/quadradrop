<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1, user-scalable=0">
    <link rel="stylesheet" href="game.css">
    <script src="game.js" defer></script>
    <title>QuadraDrop</title>
</head>

<body>
    <main class="game-shell">
        <section class="board-wrap" aria-label="QuadraDrop board">
            <div id="board" class="board" onpointerdown="pointerDown(event)" onpointermove="pointerMove(event)"
                onpointerup="pointerUp(event)" onpointercancel="pointerCancel()"></div>
            <div id="overlay" class="overlay" hidden>
                <strong id="overlay-title"></strong>
                <span id="overlay-help"></span>
            </div>
        </section>
        <aside class="sidebar">
            <div class="top-actions">
                <button id="pause" onclick="sendAction('pause')">Pause</button>
                <button class="back" aria-label="Back to menu" onclick="sendAction('back')">&#10005;</button>
            </div>
            <div class="panel"><span>Score</span><strong id="score">0</strong></div>
            <div class="panel"><span>Lines</span><strong id="lines">0</strong></div>
            <div class="panel"><span>Level</span><strong id="level">1</strong></div>
            <div class="panel next-panel"><span>Next</span>
                <div id="next" class="next"></div>
            </div>
            <div id="controls" class="controls">
                <button class="rotate-control" aria-label="Rotate left" title="Rotate left"
                    onclick="sendAction('rotate-left')">&#8634;</button>
                <button class="rotate-control" aria-label="Rotate right" title="Rotate right"
                    onclick="sendAction('rotate-right')">&#8635;</button>
                <button class="move-control" aria-label="Move left" onclick="sendAction('left')">&#9664;</button>
                <button class="move-control" aria-label="Move down" onclick="sendAction('down')">&#9660;</button>
                <button class="move-control" aria-label="Move right" onclick="sendAction('right')">&#9654;</button>
                <button class="drop-control" onclick="sendAction('drop')">Drop</button>
            </div>
        </aside>
    </main>
</body>

</html>
